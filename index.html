<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ═══ FAVICON & ICONS ══════════════════════════════════════════════ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0077e6" />

    <!-- ═══ VIEWPORT ═════════════════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══ PRIMARY SEO ══════════════════════════════════════════════════ -->
    <title>Velodrone | Advanced Drone Solutions in India – Agriculture, Surveillance & Mapping</title>
    <meta name="description"   content="Velodrone offers cutting-edge drone services across India – precision agriculture spraying, aerial surveillance, 3D mapping, industrial inspection, and DGCA-certified drone pilot training." />
    <meta name="keywords"      content="drone services India, agriculture drone, aerial surveillance India, drone mapping, DGCA approved drone, UAV services India, drone company India, Velodrone, drone pilot training India, precision farming drone" />
    <meta name="author"        content="Velodrone" />
    <meta name="robots"        content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot"     content="index, follow" />
    <link rel="canonical"      href="https://velodrone.in/" />
    <link rel="alternate" href="https://velodrone.in/" hreflang="en-IN" />
    <link rel="alternate" href="https://velodrone.in/" hreflang="en" />
    <link rel="alternate" href="https://velodrone.in/" hreflang="x-default" />

    <!-- ═══ GEO / LOCAL SEO ══════════════════════════════════════════════ -->
    <meta name="geo.region"    content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="language"      content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- ═══ OPEN GRAPH (Facebook / WhatsApp / LinkedIn) ══════════════════ -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://velodrone.in/" />
    <meta property="og:site_name"    content="Velodrone" />

    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Velodrone – Advanced Drone Solutions in India" />
    <meta property="og:locale"       content="en_IN" />

    <!-- ═══ TWITTER CARD ═════════════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@Velodrone" />
    <meta name="twitter:creator"     content="@Velodrone" />
    <meta name="twitter:url"         content="https://velodrone.in/" />
    <meta name="twitter:title"       content="Velodrone | Advanced Drone Solutions in India" />
    <meta name="twitter:description" content="India's trusted drone technology partner for agriculture, surveillance & mapping. DGCA compliant." />
    <meta name="twitter:image"       content="https://velodrone.in/og-image.svg" />

    <!-- ═══ STRUCTURED DATA : Organization ══════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Velodrone",
      "url": "https://velodrone.in",
      "logo": {
        "@type": "ImageObject",
        "url": "https://velodrone.in/logo.svg",
        "width": 200,
        "height": 60
      },
      "description": "Advanced drone technology solutions for agriculture, surveillance, mapping and industrial inspection across India.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "MG Road",
        "addressLocality": "Bangalore",
        "addressRegion": "Karnataka",
        "postalCode": "560001",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "info@velodrone.in",
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": [
        "https://www.youtube.com/@Velodrone"
      ]
    }
    </script>

    <!-- ═══ STRUCTURED DATA : LocalBusiness ══════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Velodrone",
      "url": "https://velodrone.in",
      "image": "https://velodrone.in/og-image.svg",
      "description": "Drone services company in India offering DGCA-compliant UAV solutions for agriculture, mapping, surveillance and pilot training.",
      "priceRange": "₹₹",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "MG Road",
        "addressLocality": "Bangalore",
        "addressRegion": "Karnataka",
        "postalCode": "560001",
        "addressCountry": "IN"
      },
      "areaServed": {
        "@type": "Country",
        "name": "India"
      }
    }
    </script>

    <!-- ═══ STRUCTURED DATA : FAQPage ════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Velodrone DGCA approved?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All Velodrone pilots hold valid DGCA Remote Pilot Certificates and our operations fully comply with India's Drone Rules 2021."
          }
        },
        {
          "@type": "Question",
          "name": "What drone services does Velodrone offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Velodrone offers precision agriculture drone spraying, aerial surveillance, 3D mapping and surveying, industrial inspection, real estate aerial photography, and certified drone pilot training."
          }
        },
        {
          "@type": "Question",
          "name": "Does Velodrone provide drone pilot training?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Velodrone offers DGCA-approved Remote Pilot Training programs with hands-on flight sessions, ground school, simulator training, and job placement support."
          }
        },
        {
          "@type": "Question",
          "name": "Which states does Velodrone operate in?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Velodrone operates across 18+ states in India including Jharkhand, Bihar, Odisha, West Bengal, Uttar Pradesh, Maharashtra, and more."
          }
        }
      ]
    }
    </script>

    <!-- ═══ STRUCTURED DATA : WebSite (Sitelinks Searchbox) ══════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Velodrone",
      "url": "https://velodrone.in",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://velodrone.in/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══ PERFORMANCE : Preconnect ════════════════════════════════════ -->
    <link rel="preconnect"  href="https://fonts.googleapis.com" />
    <link rel="preconnect"  href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
