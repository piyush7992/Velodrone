<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — Velodrone</title>
    <link rel="stylesheet" href="/styles/static.css">
  </head>
  <body>
    <header>
      <nav class="container">
        <h2>Velodrone</h2>
        <ul>
          <li><a href="/index.html">Home</a></li>
          <li><a href="/products.html">Products</a></li>
          <li><a href="/contact.html">Contact</a></li>
        </ul>
        <button>Get Quote</button>
      </nav>
    </header>

    <main class="container" style="padding:60px 20px;">
      <section class="contact-section">
        <span class="contact-tag">CONTACT US</span>
        <h2 class="contact-title">Let's Discuss Your<br/>Drone Project</h2>
        <p class="contact-subtitle">Ready to transform your business with drone technology? Get in touch with our experts today.</p>

        <div class="contact-wrapper">
          <div class="contact-info">
            <div class="info-card"><span>📧</span><div><h4>Email</h4><p>info@velodrone.in</p></div></div>
            <div class="info-card"><span>📞</span><div><h4>Phone</h4><p>+91 9876543210</p></div></div>
            <div class="info-card"><span>📍</span><div><h4>Location</h4><p>Bangalore, Karnataka</p></div></div>
          </div>

          <form class="contact-form" onsubmit="alert('Thank you! We\'ll contact you soon.'); return false;">
            <input type="text" placeholder="Your Name" />
            <input type="email" placeholder="Email Address" />
            <input type="text" placeholder="Phone Number" />
            <select aria-label="Service">
              <option value="">Select Service</option>
              <option value="agriculture">Agriculture</option>
              <option value="mapping">Drone Mapping</option>
              <option value="inspection">Inspection</option>
              <option value="surveillance">Surveillance</option>
              <option value="training">Pilot Training</option>
            </select>
            <textarea rows="5" placeholder="Tell us about your project..."></textarea>
            <button type="submit">Send Enquiry 🚀</button>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <h2>Velodrone</h2>
    </footer>
  </body>
</html>
